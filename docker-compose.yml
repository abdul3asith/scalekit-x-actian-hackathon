services:
  postgres:
    image: postgres:16
    container_name: scheduler_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Apply the schema (extensions + overlap exclusion constraint) on first boot.
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scheduler"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Actian VectorAI DB (per-user isolated memory).
  # Ports: 6573 REST, 6574 gRPC (the client connects here), 6575 local UI.
  vectorai:
    image: actian/vectorai:latest
    container_name: scheduler_vectorai
    restart: unless-stopped
    environment:
      ACTIAN_VECTORAI_ACCEPT_EULA: "YES"
    ports:
      - "6573-6575:6573-6575"
    volumes:
      - vectorai_data:/var/lib/actian-vectorai

volumes:
  postgres_data:
  vectorai_data:
